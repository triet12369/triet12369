<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <clipPath id="clip"><rect width="900" height="200"/></clipPath>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060b18"/>
      <stop offset="100%" stop-color="#0d1f42"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7dd3fc"/>
      <stop offset="40%"  stop-color="#ffffff"/>
      <stop offset="60%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
      <animate attributeName="x1" values="-1;1"  dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2"   dur="2.5s" repeatCount="indefinite"/>
    </linearGradient>
    <style>
      @keyframes w1 { to { transform: translateX(-900px) } }
      @keyframes w2 { to { transform: translateX(-900px) } }
      @keyframes w3 { to { transform: translateX(-900px) } }
      @keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:1} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
      .wave1 { animation: w1 18s linear infinite; }
      .wave2 { animation: w2 12s linear infinite; }
      .wave3 { animation: w3 7s linear infinite; }
      .star  { animation: twinkle 2s ease-in-out infinite; }
      .text-group { animation: float 4s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="900" height="200" fill="url(#sky)"/>

  <circle class="star" cx="45"  cy="25" r="1.2" fill="#fff" style="animation-delay:0s"/>
  <circle class="star" cx="130" cy="14" r="0.8" fill="#7dd3fc" style="animation-delay:.7s"/>
  <circle class="star" cx="210" cy="38" r="1.5" fill="#fff" style="animation-delay:1.3s"/>
  <circle class="star" cx="295" cy="11" r="0.9" fill="#fff" style="animation-delay:.3s"/>
  <circle class="star" cx="375" cy="30" r="1.1" fill="#bae6fd" style="animation-delay:1.8s"/>
  <circle class="star" cx="460" cy="8"  r="1.4" fill="#fff" style="animation-delay:.9s"/>
  <circle class="star" cx="535" cy="26" r="0.8" fill="#7dd3fc" style="animation-delay:.4s"/>
  <circle class="star" cx="618" cy="18" r="1.3" fill="#fff" style="animation-delay:1.5s"/>
  <circle class="star" cx="698" cy="36" r="0.9" fill="#bae6fd" style="animation-delay:.6s"/>
  <circle class="star" cx="775" cy="13" r="1.5" fill="#fff" style="animation-delay:1.1s"/>
  <circle class="star" cx="848" cy="30" r="1.0" fill="#fff" style="animation-delay:.2s"/>
  <circle class="star" cx="888" cy="50" r="0.7" fill="#7dd3fc" style="animation-delay:1.7s"/>
  <circle class="star" cx="88"  cy="60" r="0.9" fill="#fff" style="animation-delay:1.2s"/>
  <circle class="star" cx="178" cy="70" r="1.1" fill="#bae6fd" style="animation-delay:.5s"/>
  <circle class="star" cx="268" cy="52" r="0.7" fill="#fff" style="animation-delay:1.9s"/>
  <circle class="star" cx="350" cy="76" r="1.3" fill="#fff" style="animation-delay:.8s"/>
  <circle class="star" cx="440" cy="60" r="0.8" fill="#7dd3fc" style="animation-delay:.1s"/>
  <circle class="star" cx="558" cy="68" r="1.2" fill="#fff" style="animation-delay:1.4s"/>
  <circle class="star" cx="652" cy="82" r="0.9" fill="#bae6fd" style="animation-delay:.35s"/>
  <circle class="star" cx="738" cy="56" r="1.4" fill="#fff" style="animation-delay:1.6s"/>
  <circle class="star" cx="820" cy="74" r="0.8" fill="#fff" style="animation-delay:.75s"/>

  <g clip-path="url(#clip)">
    <path class="wave1" fill="#112244" d="M0,172 C55,162 95,162 150,172 C205,182 245,182 300,172 C355,162 395,162 450,172 C505,182 545,182 600,172 C655,162 695,162 750,172 C805,182 845,182 900,172 C955,162 995,162 1050,172 C1105,182 1145,182 1200,172 C1255,162 1295,162 1350,172 C1405,182 1445,182 1500,172 C1555,162 1595,162 1650,172 C1705,182 1745,182 1800,172 L1800,200 L0,200 Z"/>
    <path class="wave2" fill="#1a4b8c" d="M0,162 C41,147 72,147 113,162 C154,177 184,177 225,162 C266,147 297,147 338,162 C379,177 409,177 450,162 C491,147 522,147 563,162 C604,177 634,177 675,162 C716,147 747,147 788,162 C829,177 859,177 900,162 C941,147 972,147 1013,162 C1054,177 1084,177 1125,162 C1166,147 1197,147 1238,162 C1279,177 1309,177 1350,162 C1391,147 1422,147 1463,162 C1504,177 1534,177 1575,162 C1616,147 1647,147 1688,162 C1729,177 1759,177 1800,162 L1800,200 L0,200 Z"/>
    <path class="wave3" fill="#2563eb" opacity="0.7" d="M0,152 C33,130 57,130 90,152 C123,174 147,174 180,152 C213,130 237,130 270,152 C303,174 327,174 360,152 C393,130 417,130 450,152 C483,174 507,174 540,152 C573,130 597,130 630,152 C663,174 687,174 720,152 C753,130 777,130 810,152 C843,174 867,174 900,152 C933,130 957,130 990,152 C1023,174 1047,174 1080,152 C1113,130 1137,130 1170,152 C1203,174 1227,174 1260,152 C1293,130 1317,130 1350,152 C1383,174 1407,174 1440,152 C1473,130 1497,130 1530,152 C1563,174 1587,174 1620,152 C1653,130 1677,130 1710,152 C1743,174 1767,174 1800,152 L1800,200 L0,200 Z"/>
  </g>

  <g class="text-group">
    <text x="450" y="90" text-anchor="middle" fill="#1e40af" opacity="0.4" font-family="Georgia,serif" font-size="54" font-weight="700" letter-spacing="3" dy="2" dx="2">Triet Cao</text>
    <text x="450" y="90" text-anchor="middle" fill="url(#shimmer)" font-family="Georgia,serif" font-size="54" font-weight="700" letter-spacing="3">Your Name</text>
    <text x="450" y="118" text-anchor="middle" fill="#93c5fd" font-family="sans-serif" font-size="14" font-weight="400" letter-spacing="6">FULL STACK DEVELOPER</text>
  </g>
</svg>
